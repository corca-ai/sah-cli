version: 2

builds:
  - id: sah
    main: ./cmd/sah
    binary: sah
    ldflags:
      - -s -w -X main.version={{ .Version }}
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - formats: [tar.gz]
    name_template: >-
      sah_{{ .Version }}_{{ .Os }}_{{ .Arch }}

checksum:
  name_template: checksums.txt

changelog:
  use: github
  sort: asc
  format: "{{ .SHA }}: {{ .Message }}{{ if .Logins }} ({{ .Logins | englishJoin }}){{ end }}"
  groups:
    - title: Breaking Changes
      regexp: '(?i)BREAKING'
      order: 0
    - title: Added
      regexp: '^Add '
      order: 1
    - title: Fixed
      regexp: '^Fix '
      order: 2
    - title: Changed
      regexp: '^(Replace|Simplify|Consolidate|Unify|Restructure|Use|Move|Rename|Refactor)'
      order: 3
    - title: Removed
      regexp: '^Remove '
      order: 4
    - title: Documentation
      regexp: '^(Improve|Rewrite) .*(spec|doc|guide|index|readme)'
      order: 5
    - title: Other
      order: 999
  filters:
    exclude:
      - '^Merge '

release:
  github:
    owner: corca-ai
    name: sah-cli

brews:
  - repository:
      owner: corca-ai
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: https://github.com/corca-ai/sah-cli
    description: SCIENCE@home worker CLI for background agent contributions
    license: MIT
    install: |
      bin.install "sah"
    test: |
      system bin/"sah", "version"
