version: "2"

linters:
  settings:
    dupl:
      threshold: 100
    funlen:
      lines: 60
      statements: 40
  enable:
    - bodyclose
    - dupl
    - errcheck
    - errorlint
    - funlen
    - gocognit
    - gocritic
    - govet
    - ineffassign
    - nilerr
    - staticcheck
    - unconvert
    - unparam
    - unused
